<script>
  let ROW_DATA = []; let PORTFOLIO_STATUS = "Not Submitted"; let USER_CACHE = { AE: [], SC: [] }; let CURRENT_LIST = []; 
  let CAMPAIGN_RULES = []; let pendingAction = null; let debounceTimer; let confirmCallback = null;

  let DEFAULT_START_DATE = "2026-02-25";

  const REQUIRED_MAPPING_FIELDS = [
    { id: 'map_pl', label: 'Price List' }, { id: 'map_item', label: 'Item Number' }, { id: 'map_desc', label: 'Description' },
    { id: 'map_price', label: 'Current Price' }, { id: 'map_vol', label: 'Volume (Qty)' }, { id: 'map_acct_num', label: 'Account Number' },
    { id: 'map_acct_name', label: 'Account Name' }, { id: 'map_ae', label: 'AE Name (Join Key)' }, { id: 'map_sc', label: 'SC Name (Fallback)' },
    { id: 'map_class', label: 'Class Code' }, { id: 'map_seg1', label: 'Segment 1' }, { id: 'map_seg2', label: 'Segment 2' },
    { id: 'map_seg3', label: 'Segment 3' }, { id: 'map_seg4', label: 'Segment 4' }, { id: 'map_seg5', label: 'Segment 5' },
    { id: 'map_l12m_sales', label: 'L12M Sales $' }, { id: 'map_l12m_gp', label: 'L12M GP $' }
  ];

  const HIERARCHY_MAPPING_FIELDS = [
    { id: 'hmap_ae', label: 'AE Name (Match to CSV)' }, { id: 'hmap_sc', label: 'SC Name' }, 
    { id: 'hmap_mgr', label: 'Manager Name' }, { id: 'hmap_reg', label: 'Region' }, { id: 'hmap_email', label: 'AE Email' }
  ];

  // --- CUSTOM UI ALERTS/CONFIRMS ---
  function customAlert(msg, title = "Notification") {
    document.getElementById('custom-modal-title').innerText = title;
    document.getElementById('custom-modal-msg').innerHTML = msg;
    document.getElementById('btn-custom-cancel').style.display = 'none';
    document.getElementById('btn-custom-ok').onclick = () => { document.getElementById('custom-modal-overlay').style.display = 'none'; };
    document.getElementById('custom-modal-overlay').style.display = 'flex';
  }

  function customConfirm(msg, callback, title = "Confirmation") {
    document.getElementById('custom-modal-title').innerText = title;
    document.getElementById('custom-modal-msg').innerHTML = msg;
    document.getElementById('btn-custom-cancel').style.display = 'inline-block';
    confirmCallback = callback;
    
    document.getElementById('btn-custom-ok').onclick = () => { 
      document.getElementById('custom-modal-overlay').style.display = 'none'; 
      if(confirmCallback) confirmCallback(); 
    };
    document.getElementById('btn-custom-cancel').onclick = () => { 
      document.getElementById('custom-modal-overlay').style.display = 'none'; 
      confirmCallback = null;
    };
    document.getElementById('custom-modal-overlay').style.display = 'flex';
  }

  document.addEventListener('DOMContentLoaded', initData);

  function initData() {
    const container = document.getElementById('role-container');
    if (PAGE_CONTEXT === 'admin') {
        document.getElementById('login-title').innerText = "Admin Access";
        container.innerHTML = '<label><input type="radio" name="role" value="ADMIN" checked style="display:none;"></label>';
    } else if (PAGE_CONTEXT === 'manager') {
        document.getElementById('login-title').innerText = "Manager Access";
        container.innerHTML = '<label><input type="radio" name="role" value="MGR" checked style="display:none;"></label>';
        document.getElementById('login-view').style.display = 'none';
    } else {
        document.getElementById('login-title').innerText = "Identity Selection";
        container.innerHTML = '<label><input type="radio" name="role" value="AE" checked onchange="switchRole()"><span>Account Exec</span></label>';
    }

    const loader = document.getElementById('initial-loader');
    loader.style.display = 'flex';
    google.script.run.withSuccessHandler(data => { 
      USER_CACHE = data; 
      DEFAULT_START_DATE = data.defaultDate || "2026-02-25";
      if(document.getElementById('admin-default-date')) document.getElementById('admin-default-date').value = DEFAULT_START_DATE;

      if (PAGE_CONTEXT === 'manager') { start(); } else { switchRole(); }
      loader.style.display = 'none'; 
    }).getAllUsers();
    google.script.run.withSuccessHandler(b => { if(b){ document.getElementById('app-logo').src = b; document.getElementById('app-logo').style.display = 'block'; } }).getAppLogo(); 
  }
  
  function switchRole() {
    const roleElement = document.querySelector('input[name="role"]:checked');
    const role = roleElement ? roleElement.value : 'AE';
    const wrapper = document.getElementById('dropdown-wrapper');
    const startBtn = document.getElementById('btn-start');

    if (role === 'MGR') { wrapper.style.display = 'none'; startBtn.innerText = "View Team Progress"; } 
    else if (role === 'ADMIN') { wrapper.style.display = 'none'; startBtn.innerText = "Open Admin Tools"; } 
    else {
      wrapper.style.display = 'block'; startBtn.innerText = "Start Review";
      document.getElementById('user-input').value = ""; CURRENT_LIST = USER_CACHE[role] || []; renderDropdownList(CURRENT_LIST);
    }
  }

  function renderDropdownList(names) { document.getElementById('user-list').innerHTML = names.map(n => `<div class="dropdown-item" onclick="selectUser('${n}')">${n}</div>`).join(''); }
  function filterDropdown() { const text = document.getElementById('user-input').value.toLowerCase(); renderDropdownList(CURRENT_LIST.filter(n => n.toLowerCase().includes(text))); document.getElementById('user-list').style.display = 'block'; }
  function showDropdown() { filterDropdown(); }
  function selectUser(name) { document.getElementById('user-input').value = name; document.getElementById('user-list').style.display = 'none'; }
  document.addEventListener('click', e => { if (document.querySelector('.dropdown-container') && !document.querySelector('.dropdown-container').contains(e.target)) { document.getElementById('user-list').style.display = 'none'; }});

  function start() {
    const role = document.querySelector('input[name="role"]:checked').value;
    document.getElementById('login-view').style.display = 'none'; 
    document.getElementById('btn-back').style.display = 'block';
    document.getElementById('btn-back').onclick = goBack;

    if (role === 'ADMIN') {
      document.getElementById('admin-view').style.display = 'block'; document.getElementById('current-user').innerText = `Admin Control Panel`;
    } else if (role === 'MGR') {
      document.getElementById('btn-back').style.display = 'none';
      document.getElementById('manager-view').style.display = 'block'; document.getElementById('current-user').innerText = `Manager View`;
      document.getElementById('manager-table-container').innerHTML = '<div class="loading" style="padding:20px; text-align:center; font-weight:bold;">Loading Manager Data (Fast Cache)...</div>';
      
      // OPTIMIZATION: Pass "false" to trigger the instant cache load
      google.script.run.withSuccessHandler(renderManagerTable).getManagerSummary(false);
    } else {
      const user = document.getElementById('user-input').value; if(!user) { document.getElementById('login-view').style.display = 'flex'; document.getElementById('btn-back').style.display = 'none'; return customAlert("Select user."); }
      document.getElementById('dashboard-view').style.display = 'block'; document.getElementById('current-user').innerText = `${role}: ${user}`;
      
      document.getElementById('table-container').innerHTML = `
        <table id="main-data-table" style="min-width: 1500px;">
          <thead>
            <tr>
              <th width="2%" class="chk-cell"><input type="checkbox" id="master-chk" onclick="toggleAll(this)"></th>
              <th width="7%">Price List <br><input type="text" class="filter-input" data-col="priceList" onkeyup="triggerFilter()"></th>
              <th width="6%">Item # <br><input type="text" class="filter-input" data-col="itemNum" onkeyup="triggerFilter()"></th>
              <th width="14%">Description <br><input type="text" class="filter-input" data-col="desc" onkeyup="triggerFilter()"></th>
              <th width="6%">Acct Exec <br><input type="text" class="filter-input" data-col="salesPerson" onkeyup="triggerFilter()"></th>
              <th width="4%">L12M Qty</th>
              <th width="5%">L12M Sales $</th>
              <th width="4%">L12M GP %</th>
              <th width="8%">Start Date</th>
              <th width="5%" class="col-price">Curr Price <br><input type="text" class="filter-input" data-col="currPrice" placeholder=">50" onkeyup="triggerFilter()"></th>
              <th width="5%" class="col-price">Sugg Price</th>
              <th width="4%" class="col-price">Sugg %</th>
              <th width="6%" class="col-price">Est Imp</th>
              <th width="6%" class="col-price">Final $</th>
              <th width="5%" class="col-price">Final %</th>
              <th width="6%">Status</th>
              <th width="11%">Comments</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="17" style="text-align:center; padding:20px; color:#00505c; font-weight:bold;">Fetching Data from Secure Shard...</td></tr>
          </tbody>
        </table>
      `;

      google.script.run.withSuccessHandler(r => { ROW_DATA = r.items; PORTFOLIO_STATUS = r.portfolioStatus; renderTable(); }).withFailureHandler(err => { customAlert(err.message); goBack(); }).getItemsForUser(user, role);
    }
  }

  // --- NEW: Manager Deep Sync Logic ---
  function refreshManagerData() {
    const btn = document.getElementById('btn-refresh-mgr');
    btn.innerText = "Syncing...";
    btn.disabled = true;
    document.getElementById('manager-table-container').innerHTML = '<div class="loading" style="padding:20px; text-align:center; font-weight:bold; color:var(--primary);">Deep scanning all AE files... This may take up to 30 seconds.</div>';
    
    // Pass "true" to force the backend to open every spreadsheet and recalculate
    google.script.run
      .withSuccessHandler(data => {
        btn.innerText = "↻ Force Deep Sync";
        btn.disabled = false;
        renderManagerTable(data);
      })
      .withFailureHandler(err => {
        btn.innerText = "↻ Force Deep Sync";
        btn.disabled = false;
        customAlert(err.message);
      })
      .getManagerSummary(true);
  }

  function goBack() {
    document.getElementById('dashboard-view').style.display = 'none'; document.getElementById('manager-view').style.display = 'none'; document.getElementById('admin-view').style.display = 'none';
    document.getElementById('login-view').style.display = 'flex'; document.getElementById('btn-back').style.display = 'none';
  }

  // --- ADMIN MAPPING ---
  function saveAdminSettings(btn) {
    const newDate = document.getElementById('admin-default-date').value;
    if(!newDate) return customAlert("Please select a valid date.");
    btn.innerText = "Saving...";
    google.script.run.withSuccessHandler(() => {
      DEFAULT_START_DATE = newDate;
      btn.innerText = "Save Date";
      customAlert("Default Start Date saved successfully.");
    }).saveDefaultStartDate(newDate);
  }

  function fetchCsvHeaders() { 
    const folderId = document.getElementById('drive-folder-id').value; 
    if (!folderId) return customAlert("Need Folder ID"); 
    const btn = document.getElementById('btn-fetch-csv'); 
    btn.innerText = "Fetching..."; 
    btn.disabled = true; 
    console.log("1. Frontend sending request to backend for Folder ID:", folderId);

    google.script.run
      .withSuccessHandler(h => { 
        console.log("2. Backend responded with success! Headers received:", h);
        try {
          btn.innerText = "Fetch Headers"; 
          btn.disabled = false; 
          let opts = `<option value="">-- Ignore --</option>` + h.map((head, i) => `<option value="${i}">${head}</option>`).join(''); 
          document.getElementById('map-grid-items').innerHTML = REQUIRED_MAPPING_FIELDS.map(f => `<div class="map-field"><label>${f.label}</label><select id="${f.id}">${opts}</select></div>`).join(''); 
          document.getElementById('mapping-container').style.display = 'block'; 
          console.log("3. UI successfully rendered.");
        } catch (renderError) {
          console.error("❌ CRASH DURING RENDERING:", renderError);
          customAlert("Failed to render the UI. Check browser console.");
        }
      })
      .withFailureHandler(err => { 
        console.error("❌ BACKEND CRASHED:", err);
        btn.innerText = "Fetch Headers"; 
        btn.disabled = false; 
        customAlert("Backend Error: " + err.message); 
      })
      .getHeadersFromCSVFolder(folderId); 
  }

  function fetchHierarchyHeaders() { const sId = document.getElementById('hier-sheet-id').value; const tName = document.getElementById('hier-tab-name').value; if(!sId || !tName) return customAlert("Need Sheet ID and Tab Name"); const btn = document.getElementById('btn-fetch-hier'); btn.innerText = "Loading..."; btn.disabled = true; google.script.run.withSuccessHandler(h => { btn.innerText = "Fetch Headers"; btn.disabled = false; let opts = `<option value="">-- Ignore --</option>` + h.map((head, i) => `<option value="${i}">${head}</option>`).join(''); document.getElementById('hier-grid-items').innerHTML = HIERARCHY_MAPPING_FIELDS.map(f => `<div class="map-field"><label>${f.label}</label><select id="${f.id}">${opts}</select></div>`).join(''); document.getElementById('hier-mapping-container').style.display = 'block'; }).withFailureHandler(err => { btn.innerText = "Fetch Headers"; btn.disabled = false; customAlert(err.message); }).getHeadersFromHierarchySheet(sId, tName); }
  function loadSegmentsFromCSV() { const payload = { csvFolderId: document.getElementById('drive-folder-id').value, csvMap: {} }; REQUIRED_MAPPING_FIELDS.forEach(f => { payload.csvMap[f.id] = document.getElementById(f.id) ? document.getElementById(f.id).value : ""; }); if(!payload.csvFolderId || document.getElementById('map-grid-items').innerHTML === "") { return customAlert("Please complete Step 1 (CSV Ingestion & Mapping) first."); } const btn = document.getElementById('btn-load-segments'); btn.innerText = "Scanning CSVs..."; btn.disabled = true; google.script.run.withSuccessHandler(dims => { btn.innerText = "Segments Loaded!"; if (!dims) return; ['admin-seg1','admin-seg2','admin-seg3','admin-seg4','admin-seg5','admin-class'].forEach(id => { let key = id.replace('admin-',''); if(key==='class') key='classCode'; document.getElementById(id).innerHTML = `<option value="ALL">-- ALL --</option>` + dims[key].map(v => `<option value="${v}">${v}</option>`).join(''); }); document.getElementById('rules-grid-container').style.display = 'block'; }).withFailureHandler(err => { btn.innerText = "Load Segments from Mapped CSVs"; btn.disabled = false; customAlert(err.message); }).getCampaignDimensionsFromCSV(payload); }
  function addCampaignRule() { const pct = parseFloat(document.getElementById('admin-pct').value); if(isNaN(pct)) return customAlert("Valid % required."); CAMPAIGN_RULES.push({ seg1: document.getElementById('admin-seg1').value, seg2: document.getElementById('admin-seg2').value, seg3: document.getElementById('admin-seg3').value, seg4: document.getElementById('admin-seg4').value, seg5: document.getElementById('admin-seg5').value, classCode: document.getElementById('admin-class').value, pct: pct }); renderAdminRules(); }
  function removeAdminRule(index) { CAMPAIGN_RULES.splice(index, 1); renderAdminRules(); }
  function renderAdminRules() { const tb = document.getElementById('admin-rules-body'); if (CAMPAIGN_RULES.length === 0) return tb.innerHTML = `<tr><td colspan="8" style="text-align:center;">No rules.</td></tr>`; tb.innerHTML = CAMPAIGN_RULES.map((r, i) => `<tr><td>${r.seg1}</td><td>${r.seg2}</td><td>${r.seg3}</td><td>${r.seg4}</td><td>${r.seg5}</td><td>${r.classCode}</td><td class="sugg-price">+${r.pct}%</td><td><button class="btn-remove-rule" onclick="removeAdminRule(${i})">Remove</button></td></tr>`).join(''); }
  
  function executeFullPipeline() { 
    customConfirm("Are you sure? This will execute the Campaign ETL and write new Shard files per AE to Drive.", function() {
      const payload = { csvFolderId: document.getElementById('drive-folder-id').value, csvMap: {}, hierSheetId: document.getElementById('hier-sheet-id').value, hierTab: document.getElementById('hier-tab-name').value, hierMap: {}, campaignRules: CAMPAIGN_RULES }; 
      REQUIRED_MAPPING_FIELDS.forEach(f => payload.csvMap[f.id] = document.getElementById(f.id) ? document.getElementById(f.id).value : ""); 
      if(payload.csvMap.map_ae === "") return customAlert("CSV Map: 'AE Name' is mandatory for Hub and Spoke routing."); 
      HIERARCHY_MAPPING_FIELDS.forEach(f => payload.hierMap[f.id] = document.getElementById(f.id) ? document.getElementById(f.id).value : ""); 
      if(payload.hierMap.hmap_ae === "") return customAlert("Hierarchy Map: 'AE Name' is mandatory to join data."); 
      const btn = document.getElementById('btn-exec-pipeline'); const resDiv = document.getElementById('pipeline-results'); btn.innerText = "PROCESSING PIPELINE... (DO NOT CLOSE)"; btn.disabled = true; resDiv.innerHTML = "Working... This may take several minutes depending on volume."; 
      google.script.run.withSuccessHandler(r => { btn.innerText = "EXECUTE PIPELINE"; btn.disabled = false; let h = `<strong style="color:var(--pos)">SUCCESS! Processed ${r.processed} Rows into Hub & Spoke Shards.</strong><br><a href="${r.folderUrl}" target="_blank">Open Master Output Folder</a><br><br>`; r.files.forEach(f => h += `• ${f.key} (${f.count} rows) - <a href="${f.url}" target="_blank">View File</a><br>`); resDiv.innerHTML = h; }).withFailureHandler(e => { btn.innerText = "EXECUTE PIPELINE"; btn.disabled = false; resDiv.innerHTML = `<span style="color:red">Error: ${e.message}</span>`; }).runETLPipeline(payload); 
    });
  }

  // --- DASHBOARD LOGIC ---
  function formatDateForInput(dateStr) { if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr; return DEFAULT_START_DATE; }

  function renderTable() {
    const body = document.getElementById('table-body');
    const statusView = document.getElementById('status-filter').value;
    const activeFilters = {}; 
    document.querySelectorAll('.filter-input').forEach(input => { if (input.value && input.dataset.col) activeFilters[input.dataset.col] = input.value.toLowerCase().trim(); });

    let isFrozen = (PORTFOLIO_STATUS === "Pending Manager Approval" || PORTFOLIO_STATUS === "Pending Approval" || PORTFOLIO_STATUS === "Approved");
    let disabledAttr = isFrozen ? "disabled" : "";

    if(isFrozen) {
       document.getElementById('master-chk').disabled = true;
       document.getElementById('btn-submit-portfolio').style.display = 'none';
       document.getElementById('portfolio-status-badge').innerText = PORTFOLIO_STATUS;
       document.getElementById('portfolio-status-badge').style.display = 'inline-block';
    } else {
       document.getElementById('master-chk').disabled = false;
       
       if(document.querySelector('input[name="role"]:checked') && document.querySelector('input[name="role"]:checked').value === 'MGR'){
           document.getElementById('btn-submit-portfolio').style.display = 'none';
       } else {
           document.getElementById('btn-submit-portfolio').style.display = 'inline-block';
       }
       
       if(PORTFOLIO_STATUS === "Manager Rejected") {
           document.getElementById('portfolio-status-badge').innerText = "Action Required: " + PORTFOLIO_STATUS;
           document.getElementById('portfolio-status-badge').style.display = 'inline-block';
       } else {
           document.getElementById('portfolio-status-badge').style.display = 'none';
       }
    }

    const visibleItems = ROW_DATA.filter(row => {
        const status = row.status || "PENDING"; if (statusView !== 'ALL' && status !== statusView) return false;
        for (let col in activeFilters) {
          let filterVal = activeFilters[col]; let cellVal = row[col];
          if (col === 'currPrice') {
            const numVal = parseFloat(cellVal); const filterNum = parseFloat(filterVal.replace(/[<>=]/g, ''));
            if (filterVal.startsWith('>=') && numVal < filterNum) return false;
            else if (filterVal.startsWith('<=') && numVal > filterNum) return false;
            else if (filterVal.startsWith('>') && numVal <= filterNum) return false;
            else if (filterVal.startsWith('<') && numVal >= filterNum) return false;
            else if (!filterVal.match(/[<>=]/) && !numVal.toString().includes(filterVal)) return false;
          } else { let textVal = (cellVal || "").toString().toLowerCase(); if (!textVal.includes(filterVal)) return false; }
        } return true;
    });

    if(visibleItems.length === 0) { body.innerHTML = "<tr><td colspan='17' style='text-align:center; padding:20px; font-weight:bold; color:#a73321;'>✅ No Items Found matching filters</td></tr>"; document.getElementById('stats').innerText = "Showing 0 items"; return; }
    updateTotals();

    let html = visibleItems.map((row) => {
      const index = ROW_DATA.indexOf(row);
      const status = row.status || "PENDING"; 
      
      let badgeClass = "badge-pending";
      if (status === "APPROVED") badgeClass = "badge-approved";
      else if (status === "REJECTED") badgeClass = "badge-rejected";
      else if (status === "MODIFIED") badgeClass = "badge-modified";

      let volDisplay = row.volDisplay || row.qty.toFixed(0); 
      let finalDisplay = (row.finalPrice !== "" && row.finalPrice !== 0 && row.finalPrice !== null) ? parseFloat(row.finalPrice).toFixed(2) : "";
      let dateVal = formatDateForInput(row.startDate);

      let suggPct = row.currPrice > 0 ? Math.round(((row.suggPrice - row.currPrice) / row.currPrice) * 100) : 0;
      let finalPct = row.currPrice > 0 && row.finalPrice ? Math.round(((row.finalPrice - row.currPrice) / row.currPrice) * 100) : "";
      
      let modPctVal = finalPct !== "" ? finalPct : suggPct;
      if (finalDisplay === "") finalDisplay = parseFloat(row.suggPrice).toFixed(2);

      let l12mSalesDisplay = "$" + row.l12mSales.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      let gpPct = row.l12mSales > 0 ? ((row.l12mGP / row.l12mSales) * 100).toFixed(1) + "%" : "0.0%";

      return `<tr id="tr-${index}" class="data-row">
          <td class="chk-cell"><input type="checkbox" class="row-chk" value="${index}" onchange="updateBulkBar()" ${disabledAttr}></td>
          <td><div style="font-weight:bold; color:#00505c">${row.priceList}</div></td>
          <td style="font-weight:bold;">${row.itemNum}</td>
          <td>${row.desc}</td>
          <td>${row.salesPerson || ""}</td>
          <td style="font-weight:bold; color:#555">${volDisplay}</td>
          <td style="color:#555">${l12mSalesDisplay}</td>
          <td style="color:#555">${gpPct}</td>
          <td><input type="date" class="input-editable" style="font-family:'Roboto Mono', monospace;" value="${dateVal}" onchange="updateDate(${index}, this.value)" ${disabledAttr}></td>
          <td class="col-price">$${row.currPrice.toFixed(2)}</td>
          <td class="col-price sugg-price">$${row.suggPrice.toFixed(2)}</td>
          <td class="col-price sugg-price">${suggPct}%</td>
          <td class="col-price impact-val">$${row.estImpact.toFixed(2)}</td>
          <td class="col-price col-final"><input type="number" step="0.01" class="input-editable" style="font-family:'Roboto Mono', monospace;" value="${finalDisplay}" onchange="updateFinalPriceInline(${index}, this.value)" ${disabledAttr}></td>
          <td class="col-price"><input type="number" step="1" class="input-editable" style="font-family:'Roboto Mono', monospace;" value="${modPctVal}" onchange="updatePctInline(${index}, this.value)" ${disabledAttr}></td>
          <td><span id="badge-${index}" class="status-badge ${badgeClass}">${status}</span></td>
          <td><input type="text" class="input-editable" placeholder="Comment..." value="${row.comment || ""}" onchange="updateCommentInline(${index}, this.value)" ${disabledAttr}></td>
      </tr>`;
    }).join('');

    body.innerHTML = html;
    document.getElementById('stats').innerText = `Showing ${visibleItems.length} items`;
  }

  function autoDetermineStatus(item) {
     let curr = parseFloat(item.currPrice);
     let sugg = parseFloat(item.suggPrice);
     let finalP = parseFloat(item.finalPrice);
     let dDate = item.startDate || DEFAULT_START_DATE;

     if (Math.abs(finalP - curr) < 0.01) {
         item.finalPrice = curr; 
         return "REJECTED";
     } 
     else if (Math.abs(finalP - sugg) < 0.01 && dDate === DEFAULT_START_DATE) {
         return "APPROVED";
     } 
     else {
         return "MODIFIED";
     }
  }

  function updateFinalPriceInline(index, priceStr) {
    let item = ROW_DATA[index];
    let price = parseFloat(priceStr);
    if (isNaN(price)) return renderTable(); 
    
    if (price < item.currPrice) {
        customAlert("Safeguard Alert: Final price cannot be set below the current price ($" + item.currPrice.toFixed(2) + ").");
        return renderTable(); 
    }

    item.finalPrice = price;
    item.status = autoDetermineStatus(item);
    
    if (item.status === "REJECTED" && !item.comment) {
       openCommentModal('SINGLE', index);
    } else {
       decide(index, item.status, item.comment, item.finalPrice, item.startDate);
    }
  }

  function updatePctInline(index, pctStr) {
    let item = ROW_DATA[index];
    let pct = parseInt(pctStr);
    if (isNaN(pct)) return renderTable();
    
    let newPrice = item.currPrice * (1 + (pct / 100));
    if (newPrice < item.currPrice) {
        customAlert("Safeguard Alert: Final percentage cannot drop price below current. Percentage must be >= 0.");
        return renderTable(); 
    }

    item.finalPrice = newPrice;
    item.status = autoDetermineStatus(item);

    if (item.status === "REJECTED" && !item.comment) {
       openCommentModal('SINGLE', index);
    } else {
       decide(index, item.status, item.comment, item.finalPrice, item.startDate);
    }
  }

  function updateDate(index, val) { 
    let item = ROW_DATA[index];
    item.startDate = val; 
    if (!item.finalPrice) item.finalPrice = item.suggPrice;
    item.status = autoDetermineStatus(item);
    
    decide(index, item.status, item.comment, item.finalPrice, item.startDate);
  }
  
  function updateCommentInline(index, val) {
    let item = ROW_DATA[index];
    item.comment = val;
    if (!item.finalPrice) item.finalPrice = item.suggPrice;
    decide(index, item.status || 'PENDING', item.comment, item.finalPrice, item.startDate);
  }

  function updateTotals() {
    let totalEst = 0; let totalReal = 0;
    ROW_DATA.forEach(row => {
      if (row.estImpact) totalEst += row.estImpact;
      if ((row.status === "APPROVED" || row.status === "MODIFIED") && row.finalPrice && row.qty > 0) {
         let groupRealized = (row.finalPrice - row.currPrice) * row.qty;
         if (row.rowIds && row.rowIds.length > 0) { totalReal += (groupRealized / row.rowIds.length); }
      }
    });
    document.getElementById('total-est').innerText = "$" + totalEst.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('total-real').innerText = "$" + totalReal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    
    if(PAGE_CONTEXT === 'manager'){
        document.getElementById('mgr-total-est').innerText = document.getElementById('total-est').innerText;
        document.getElementById('mgr-total-real').innerText = document.getElementById('total-real').innerText;
    }
  }

  function openCommentModal(type, index) { pendingAction = { type: type, index: index }; document.getElementById('modal-comment').value = ROW_DATA[index] ? ROW_DATA[index].comment || "" : ""; document.getElementById('comment-modal').style.display = 'block'; }
  function confirmRejection() { 
    const reason = document.getElementById('modal-comment').value.trim(); 
    if (!reason) return customAlert("Comment is required for 0% increases."); 
    
    if (pendingAction.type === 'SINGLE') { 
       let item = ROW_DATA[pendingAction.index];
       item.comment = reason;
       decide(pendingAction.index, item.status, reason, item.finalPrice, item.startDate); 
    } else if (pendingAction.type === 'BULK_ZERO') {
       const selected = document.querySelectorAll('.row-chk:checked');
       const indicesToUpdate = [];
       selected.forEach(chk => {
         const idx = parseInt(chk.value);
         const item = ROW_DATA[idx];
         item.finalPrice = item.currPrice; // 0%
         item.comment = reason;
         if (pendingAction.date) item.startDate = pendingAction.date;
         if (!item.startDate) item.startDate = DEFAULT_START_DATE;
         item.status = 'REJECTED';
         indicesToUpdate.push(idx);
       });
       renderTable();
       document.getElementById('master-chk').checked = false;
       document.getElementById('bulk-bar').style.display = 'none';

       const bulkPayload = indicesToUpdate.map(idx => ({ rowIds: ROW_DATA[idx].rowIds, decision: ROW_DATA[idx].status, finalPrice: ROW_DATA[idx].finalPrice, comment: ROW_DATA[idx].comment, startDate: ROW_DATA[idx].startDate, aeName: ROW_DATA[idx].salesPerson }));
       google.script.run.submitReview(bulkPayload);
    }
    closeModals(); 
  }
  function closeModals() { document.getElementById('comment-modal').style.display = 'none'; pendingAction = null; renderTable(); }

  function bulkApply() {
    const pctStr = document.getElementById('bulk-pct-input').value;
    const dateVal = document.getElementById('bulk-date-input').value;
    
    if (!pctStr && !dateVal) return customAlert("Please enter a % or select a date to apply updates.");
    
    const selected = document.querySelectorAll('.row-chk:checked');
    if (selected.length === 0) return customAlert("Select items first.");
    
    let pct = NaN;
    if (pctStr !== "") {
        pct = parseInt(pctStr);
        if (isNaN(pct) || pct < 0) return customAlert("Please enter a valid percentage >= 0.");
        if (pct === 0) {
            pendingAction = { type: 'BULK_ZERO', date: dateVal };
            document.getElementById('modal-comment').value = "";
            document.getElementById('comment-modal').style.display = 'block';
            return;
        }
    }
    
    const indicesToUpdate = [];
    selected.forEach(chk => {
      const idx = parseInt(chk.value); 
      const item = ROW_DATA[idx];
      
      if (!isNaN(pct)) {
          item.finalPrice = item.currPrice * (1 + (pct / 100));
      }
      if (dateVal) {
          item.startDate = dateVal;
      }
      if(!item.startDate) item.startDate = DEFAULT_START_DATE;
      if(!item.finalPrice) item.finalPrice = item.suggPrice;
      
      item.status = autoDetermineStatus(item);
      indicesToUpdate.push(idx);
    });
    
    renderTable(); 
    document.getElementById('master-chk').checked = false; 
    document.getElementById('bulk-bar').style.display = 'none';
    
    const bulkPayload = indicesToUpdate.map(idx => ({ rowIds: ROW_DATA[idx].rowIds, decision: ROW_DATA[idx].status, finalPrice: ROW_DATA[idx].finalPrice, comment: ROW_DATA[idx].comment, startDate: ROW_DATA[idx].startDate, aeName: ROW_DATA[idx].salesPerson }));
    google.script.run.submitReview(bulkPayload);
  }

  function bulkDecide(decision, comment="") {
    const selected = document.querySelectorAll('.row-chk:checked'); if (selected.length === 0) return;
    const indicesToUpdate = [];
    selected.forEach(chk => {
      const idx = parseInt(chk.value); indicesToUpdate.push(idx); const item = ROW_DATA[idx];
      if (decision === 'APPROVED') { if(!item.finalPrice) item.finalPrice = item.suggPrice; } else item.finalPrice = "";
      item.status = decision; if(comment) item.comment = comment; if(!item.startDate) item.startDate = DEFAULT_START_DATE;
    });
    renderTable(); document.getElementById('master-chk').checked = false; document.getElementById('bulk-bar').style.display = 'none';
    const bulkPayload = indicesToUpdate.map(idx => ({ rowIds: ROW_DATA[idx].rowIds, decision: decision, finalPrice: ROW_DATA[idx].finalPrice, comment: ROW_DATA[idx].comment, startDate: ROW_DATA[idx].startDate, aeName: ROW_DATA[idx].salesPerson }));
    google.script.run.submitReview(bulkPayload);
  }

  function decide(index, decision, comment="", price=null, date="") {
    const item = ROW_DATA[index]; item.status = decision; if (comment) item.comment = comment; if (price !== null) item.finalPrice = price; if (date) item.startDate = date; 
    renderTable();
    const payload = [{ rowIds: item.rowIds, decision: decision, finalPrice: item.finalPrice, comment: item.comment, startDate: item.startDate, aeName: item.salesPerson }];
    google.script.run.submitReview(payload);
  }

  function toggleAll(master) { document.querySelectorAll('.row-chk').forEach(chk => chk.checked = master.checked); updateBulkBar(); }
  function updateBulkBar() { const count = document.querySelectorAll('.row-chk:checked').length; document.getElementById('bulk-bar').style.display = count > 0 ? 'flex' : 'none'; document.getElementById('selected-count').innerText = count; }
  function triggerFilter() { clearTimeout(debounceTimer); debounceTimer = setTimeout(renderTable, 400); }
  function clearAllFilters() { document.querySelectorAll('.filter-input').forEach(input => input.value = ""); document.getElementById('status-filter').value = "ALL"; renderTable(); }

  function renderManagerTable(data) {
     const mgrGroups = {};
     let totalRegEst = 0;
     let totalRegReal = 0;

     data.forEach(r => {
         let mName = r.managerName || 'Unassigned';
         if(!mgrGroups[mName]) mgrGroups[mName] = [];
         mgrGroups[mName].push(r);
         totalRegEst += r.estImpact;
         totalRegReal += r.realized;
     });

     document.getElementById('mgr-total-est').innerText = "$" + totalRegEst.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
     document.getElementById('mgr-total-real').innerText = "$" + totalRegReal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

     let html = "";
     for(let mgr in mgrGroups) {
         html += `<h3 style="color:var(--primary); margin-top:25px; border-bottom: 2px solid var(--info); padding-bottom: 5px;">Manager: ${mgr}</h3>`;
         html += `<table><thead><tr><th>AE Name</th><th>Total Items</th><th>Pending</th><th>Approved/Mod</th><th>Est Impact</th><th>Realized Impact</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
         
         mgrGroups[mgr].forEach(row => {
             let badgeColor = row.portfolioStatus === "Approved" ? "badge-approved" : (row.portfolioStatus === "Pending Manager Approval" ? "badge-frozen" : "badge-pending");
             let actionBtns = "";
             
             if(row.portfolioStatus === "Pending Manager Approval") {
                 actionBtns = `<button class="btn-export" style="background:var(--pos); padding:4px 10px; margin-right: 5px;" onclick="managerAction('${row.aeName}', 'Approved')">Approve</button>
                               <button class="btn-export" style="background:var(--neg); padding:4px 10px;" onclick="managerAction('${row.aeName}', 'Manager Rejected')">Reject</button>`;
             }

             html += `<tr>
                 <td><span style="font-weight:bold; color:var(--info); cursor:pointer; text-decoration:underline;" onclick="loadAEViewAsManager('${row.aeName}')">${row.aeName}</span></td>
                 <td>${row.total}</td><td>${row.pending}</td><td>${row.approved}</td><td class="val-est">$${row.estImpact.toFixed(2)}</td><td class="val-real">$${row.realized.toFixed(2)}</td><td><span class="status-badge ${badgeColor}">${row.portfolioStatus}</span></td>
                 <td>${actionBtns}</td>
             </tr>`;
         });
         html += `</tbody></table>`;
     }
     document.getElementById('manager-table-container').innerHTML = html;
  }

  function managerAction(aeName, decision) {
     let msg = decision === 'Approved' ? `Approve ${aeName}'s portfolio?` : `Reject ${aeName}'s portfolio? They will be able to edit it again.`;
     customConfirm(msg, function() {
         const loader = document.getElementById('initial-loader');
         loader.style.display = 'flex';
         google.script.run.withSuccessHandler(() => {
             loader.style.display = 'none';
             customAlert(`Portfolio for ${aeName} has been ${decision === 'Approved' ? 'Approved' : 'Rejected'}.`);
             start(); 
         }).withFailureHandler(e => {
             loader.style.display = 'none';
             customAlert("Error: " + e.message);
         }).managerDecision(aeName, decision);
     });
  }

  function loadAEViewAsManager(aeName) {
     document.getElementById('manager-view').style.display = 'none';
     document.getElementById('dashboard-view').style.display = 'block';
     document.getElementById('current-user').innerText = `Manager Viewing: ${aeName}`;
     document.getElementById('user-input').value = aeName; 
     
     document.getElementById('btn-back').style.display = 'block';
     document.getElementById('btn-back').onclick = function() {
         document.getElementById('dashboard-view').style.display = 'none';
         document.getElementById('manager-view').style.display = 'block';
         document.getElementById('current-user').innerText = `Manager View`;
         document.getElementById('btn-back').style.display = 'none'; 
         start(); 
     };

     document.getElementById('table-container').innerHTML = `
        <table id="main-data-table" style="min-width: 1500px;">
          <thead>
            <tr>
              <th width="2%" class="chk-cell"><input type="checkbox" id="master-chk" onclick="toggleAll(this)"></th>
              <th width="7%">Price List <br><input type="text" class="filter-input" data-col="priceList" onkeyup="triggerFilter()"></th>
              <th width="6%">Item # <br><input type="text" class="filter-input" data-col="itemNum" onkeyup="triggerFilter()"></th>
              <th width="14%">Description <br><input type="text" class="filter-input" data-col="desc" onkeyup="triggerFilter()"></th>
              <th width="6%">Acct Exec <br><input type="text" class="filter-input" data-col="salesPerson" onkeyup="triggerFilter()"></th>
              <th width="4%">L12M Qty</th>
              <th width="5%">L12M Sales $</th>
              <th width="4%">L12M GP %</th>
              <th width="8%">Start Date</th>
              <th width="5%" class="col-price">Curr Price <br><input type="text" class="filter-input" data-col="currPrice" placeholder=">50" onkeyup="triggerFilter()"></th>
              <th width="5%" class="col-price">Sugg Price</th>
              <th width="4%" class="col-price">Sugg %</th>
              <th width="6%" class="col-price">Est Imp</th>
              <th width="6%" class="col-price">Final $</th>
              <th width="5%" class="col-price">Final %</th>
              <th width="6%">Status</th>
              <th width="11%">Comments</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="17" style="text-align:center; padding:20px; color:#00505c; font-weight:bold;">Fetching Data from Secure Shard...</td></tr>
          </tbody>
        </table>
     `;
     
     google.script.run.withSuccessHandler(r => { ROW_DATA = r.items; PORTFOLIO_STATUS = r.portfolioStatus; renderTable(); }).withFailureHandler(err => { customAlert(err.message); start(); }).getItemsForUser(aeName, 'MGR');
  }

  function submitPortfolioAE() {
     customConfirm("Are you sure you want to submit your portfolio for Manager review?", function() {
         const user = document.getElementById('user-input').value;
         const roleElement = document.querySelector('input[name="role"]:checked');
         const role = roleElement ? roleElement.value : (PAGE_CONTEXT === 'manager' ? 'MGR' : 'AE');
         google.script.run.withSuccessHandler(()=>{ customAlert("Portfolio Submitted!"); start(); }).submitPortfolio(user, role);
     });
  }

  function exportToExcel() {
     let csvContent = "data:text/csv;charset=utf-8,Price List,Item Num,Description,AE Name,Est Impact,Qty,Current Price,Suggested Price,Final Price,Status,Comment\n";
     ROW_DATA.forEach(row => {
         let rArray = [ `"${row.priceList}"`, `"${row.itemNum}"`, `"${row.desc}"`, `"${row.salesPerson}"`, row.estImpact, row.qty, row.currPrice, row.suggPrice, row.finalPrice || "", row.status, `"${row.comment}"`];
         csvContent += rArray.join(",") + "\n";
     });
     const encodedUri = encodeURI(csvContent); const link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", "BulkPack_Export.csv"); document.body.appendChild(link); link.click(); document.body.removeChild(link);
  }
</script>
